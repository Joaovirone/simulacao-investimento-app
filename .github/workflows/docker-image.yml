name: Imagem no Docker Hub !!

on:
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ "master" ]

jobs:
  docker-deploy:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-24.04

    steps:
    - name: "1 - Baixar código do repositório"
      uses: actions/checkout@v4

    - name: "2 - Configurar Docker Buildx"
      uses: docker/setup-buildx-action@v3

    - name: "3 - Login no Docker Hub"
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}  
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: "4 - Construir e Enviar Backend"
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: ${{ github.event_name == 'push' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/nome_do_repositorio:backend-latest
          ${{ secrets.DOCKERHUB_USERNAME }}/nome_do_repositorio:backend-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: "5 - Construir e Enviar Frontend"
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: ${{ github.event_name == 'push' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/nome_do_repositorio/frontend/latest
          ${{ secrets.DOCKERHUB_USERNAME }}/nome_do_repositorio:frontend-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

        

      

