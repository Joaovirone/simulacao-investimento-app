
services:
  backend:
    build:
      context: ./backend
    container_name: backend-investimento-simulador
    ports:
      - "3333:3333"

    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - sqlite_data:/usr/src/app/prisma
    environment:
      - DATABASE_URL="file:./dev.db"

  frontend:
    build:
      context: ./frontend
    container_name: frontend-investimento-simulador
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    
    depends_on:
      - backend
    
volumes:
  sqlite_data: