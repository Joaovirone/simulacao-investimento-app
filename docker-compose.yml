services:
  
  database:
    image: postgres:16-alpine
    container_name: db-simulador-investimento
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "9001:5432"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "512M"

    volumes:
      - pgdata:/var/lib/postgresql/data


